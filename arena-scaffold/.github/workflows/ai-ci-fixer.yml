name: AI CI Fixer

# Triggered after the main CI workflow completes. Activates automatically
# when ANTHROPIC_API_KEY is set as a repo secret — customer brings their own
# key, the presence of the key IS the opt-in. No second flag needed.
#
# Escape hatch: set the GATETEST_AI_CI_FIXER repository variable to "0" to
# explicitly disable even when the key is present (useful if a customer is
# burning through tokens). Any other value (including "1" or unset) leaves
# the fixer enabled.

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents:       write
  pull-requests:  write
  issues:         write
  actions:        read

jobs:
  ai-fixer:
    name: AI CI Fixer
    runs-on: ubuntu-latest
    # Only run on failed CI runs.
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    env:
      ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
      GATETEST_AI_CI_FIXER: ${{ vars.GATETEST_AI_CI_FIXER || '' }}
    steps:
      - name: Check ANTHROPIC_API_KEY presence + opt-out flag
        id: gate
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "AI CI-fixer disabled (no ANTHROPIC_API_KEY secret set)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${GATETEST_AI_CI_FIXER}" = "0" ]; then
            echo "AI CI-fixer disabled (GATETEST_AI_CI_FIXER=0 — explicitly opted out)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Checkout failing branch
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref:         ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          # Keep the GITHUB_TOKEN around so `git push` can authenticate.
          persist-credentials: true

      - name: Setup Node
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: npm ci

      - name: Run AI CI-fixer
        if: steps.gate.outputs.skip != 'true' && env.ANTHROPIC_API_KEY != ''
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WORKFLOW_RUN_ID:   ${{ github.event.workflow_run.id }}
          MAX_FIX_ATTEMPTS:  '3'
          CLAUDE_MODEL:      'claude-opus-4-7'
        run: node scripts/ai-ci-fixer.js
