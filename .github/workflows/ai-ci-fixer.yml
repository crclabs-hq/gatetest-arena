# ============================================================================
# GATETEST AI CI-FIXER — STANDALONE INTEGRATION TEMPLATE
# ============================================================================
# Drop-in workflow that watches the target repo's "CI" workflow and, when it
# fails, asks Claude to repair the breakage and opens a fix PR.

name: AI CI Fixer

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents:      write
  pull-requests: write
  issues:        write
  actions:       read

jobs:
  ai-fixer:
    name: AI CI Fixer
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    env:
      ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
      GATETEST_AI_CI_FIXER: ${{ vars.GATETEST_AI_CI_FIXER || '' }}
    steps:
      - name: Gate on ANTHROPIC_API_KEY + opt-out flag
        id: gate
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "AI CI-fixer disabled (no ANTHROPIC_API_KEY secret set)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${GATETEST_AI_CI_FIXER}" = "0" ]; then
            echo "AI CI-fixer disabled (GATETEST_AI_CI_FIXER=0 — explicitly opted out)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Checkout failing branch of target repo
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref:                 ${{ github.event.workflow_run.head_sha }}
          fetch-depth:         0
          persist-credentials: true

      - name: Setup Node.js
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Clone GateTest (single source of truth)
        if: steps.gate.outputs.skip != 'true'
        env:
          GATETEST_TOKEN: ${{ secrets.GATETEST_TOKEN }}
        run: |
          if [ -n "$GATETEST_TOKEN" ]; then
            git clone --depth 1 "https://x-access-token:${GATETEST_TOKEN}@github.com/crclabs-hq/gatetest.git" "$RUNNER_TEMP/gatetest"
          else
            git clone --depth 1 "https://github.com/crclabs-hq/gatetest.git" "$RUNNER_TEMP/gatetest"
          fi
          echo "GATETEST_HOME=$RUNNER_TEMP/gatetest" >> "$GITHUB_ENV"

      - name: Install fixer dependencies
        if: steps.gate.outputs.skip != 'true'
        run: |
          cd "$GATETEST_HOME"
          npm ci --omit=dev --ignore-scripts 2>/dev/null \
            || npm install --production --ignore-scripts 2>/dev/null \
            || true

      - name: Run AI CI-fixer
        if: steps.gate.outputs.skip != 'true' && env.ANTHROPIC_API_KEY != ''
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WORKFLOW_RUN_ID:   ${{ github.event.workflow_run.id }}
          MAX_FIX_ATTEMPTS:  '3'
          CLAUDE_MODEL:      'claude-sonnet-4-7'
        run: node "$GATETEST_HOME/scripts/ai-ci-fixer.js"
